<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5B2D8E"/>
      <stop offset="100%" stop-color="#3A1A66"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="50%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#E89D00"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#E5E5E5"/>
      <stop offset="100%" stop-color="#A0A0A0"/>
    </linearGradient>
    <filter id="dropShadow"><feDropShadow dx="3" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>

  <!-- Top arc background -->
  <path d="M 130,260 A 270,210 0 0 1 670,260 L 670,300 L 130,300 Z" fill="url(#bgGrad)" stroke="#FFC107" stroke-width="6" filter="url(#dropShadow)"/>
  <!-- Halftone dots in arc -->
  <g fill="#7E4AB8" opacity="0.5">
    <circle cx="220" cy="200" r="3"/><circle cx="240" cy="180" r="3"/><circle cx="270" cy="170" r="3"/>
    <circle cx="320" cy="155" r="3"/><circle cx="370" cy="145" r="3"/><circle cx="420" cy="145" r="3"/>
    <circle cx="470" cy="155" r="3"/><circle cx="520" cy="170" r="3"/><circle cx="560" cy="190" r="3"/>
    <circle cx="200" cy="240" r="3"/><circle cx="250" cy="220" r="3"/><circle cx="350" cy="200" r="3"/>
    <circle cx="450" cy="200" r="3"/><circle cx="550" cy="220" r="3"/><circle cx="600" cy="240" r="3"/>
  </g>

  <!-- Brain illustration (gold cluster) -->
  <g transform="translate(330,90)" filter="url(#dropShadow)">
    <circle cx="20"  cy="35" r="18" fill="url(#goldGrad)"/>
    <circle cx="50"  cy="25" r="20" fill="url(#goldGrad)"/>
    <circle cx="80"  cy="35" r="18" fill="url(#goldGrad)"/>
    <circle cx="35"  cy="60" r="18" fill="url(#goldGrad)"/>
    <circle cx="65"  cy="60" r="18" fill="url(#goldGrad)"/>
    <circle cx="50"  cy="80" r="14" fill="url(#goldGrad)"/>
  </g>
  <!-- Lightbulb -->
  <g transform="translate(450,90)" filter="url(#dropShadow)">
    <rect x="20" y="50" width="20" height="14" rx="2" fill="#5B2D8E"/>
    <circle cx="30" cy="35" r="22" fill="url(#goldGrad)"/>
    <path d="M 20,30 Q 30,15 40,30" stroke="#FFE066" stroke-width="3" fill="none"/>
  </g>

  <!-- "LIVE TRIVIA COMPETITION" banner -->
  <rect x="180" y="245" width="440" height="42" rx="6" fill="#1A1033" stroke="#FFC107" stroke-width="3"/>
  <text x="400" y="274" text-anchor="middle" fill="#FFFFFF" font-family="'Archivo','Inter',sans-serif" font-weight="800" font-size="22" letter-spacing="0.08em">LIVE TRIVIA COMPETITION</text>

  <!-- Main badge body -->
  <rect x="80" y="290" width="640" height="200" rx="18" fill="url(#bgGrad)" stroke="#FFC107" stroke-width="7" filter="url(#dropShadow)"/>
  <rect x="92" y="302" width="616" height="176" rx="12" fill="none" stroke="#B569E8" stroke-width="2"/>

  <!-- SCREEN -->
  <text x="400" y="385" text-anchor="middle" fill="url(#silverGrad)" font-family="'Anton','Bebas Neue','Archivo Black','Impact',sans-serif" font-weight="900" font-size="92" letter-spacing="0.02em" stroke="#1A1033" stroke-width="3" paint-order="stroke">SCREEN</text>

  <!-- TEST -->
  <text x="400" y="455" text-anchor="middle" fill="url(#goldGrad)" font-family="'Anton','Bebas Neue','Archivo Black','Impact',sans-serif" font-weight="900" font-size="76" letter-spacing="0.02em" stroke="#5B2D8E" stroke-width="3" paint-order="stroke">TEST!</text>

  <!-- Question mark speech bubble (left) -->
  <g transform="translate(30,360)" filter="url(#dropShadow)">
    <path d="M 0,40 L 20,0 L 110,0 L 110,80 L 20,80 Z" fill="#5B2D8E" stroke="#FFC107" stroke-width="3"/>
    <text x="55" y="56" text-anchor="middle" fill="#FFFFFF" font-family="'Archivo Black',sans-serif" font-weight="900" font-size="44">?</text>
  </g>
  <!-- Exclamation speech bubble (right) -->
  <g transform="translate(660,360)" filter="url(#dropShadow)">
    <path d="M 110,40 L 90,0 L 0,0 L 0,80 L 90,80 Z" fill="#5B2D8E" stroke="#FFC107" stroke-width="3"/>
    <text x="55" y="56" text-anchor="middle" fill="#FFFFFF" font-family="'Archivo Black',sans-serif" font-weight="900" font-size="44">!</text>
  </g>

  <!-- "PLAY · COMPETE · WIN" tagline -->
  <rect x="220" y="488" width="360" height="34" rx="6" fill="#1A1033" stroke="#FFC107" stroke-width="3"/>
  <text x="400" y="511" text-anchor="middle" fill="#FFFFFF" font-family="'Archivo','Inter',sans-serif" font-weight="800" font-size="18" letter-spacing="0.18em">PLAY · COMPETE · WIN</text>
</svg>
