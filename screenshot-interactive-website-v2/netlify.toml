[build]
  publish = "."

[[redirects]]
  from = "/magicmirror"
  to = "/activations/magic-mirror"
  status = 301

[[redirects]]
  from = "/photobooths"
  to = "/activations/magic-mirror"
  status = 301

[[redirects]]
  from = "/360videobooth"
  to = "/activations/360-video"
  status = 301

[[redirects]]
  from = "/copy-of-digital-advertising"
  to = "/activations"
  status = 301

[[redirects]]
  from = "/copy-of-tabletab"
  to = "/activations/digital-advertising"
  status = 301

[[redirects]]
  from = "/copy-of-mobile-magic-mirror"
  to = "/activations/outdoor-cinema"
  status = 301

[[redirects]]
  from = "/tabletab"
  to = "/activations/digital-advertising"
  status = 301

[[redirects]]
  from = "/ourblog"
  to = "/blog"
  status = 301

# Catch-all 404
[[redirects]]
  from = "/*"
  to = "/404/index.html"
  status = 404

[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/assets/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/assets/*.ttf"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*.woff*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=60"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
